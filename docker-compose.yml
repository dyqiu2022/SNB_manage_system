services:

  db:
    image: hub.rat.dev/library/postgres:15
    container_name: ivd_postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: ivd_data
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - ivd_net

  nocodb:
    image: hub.rat.dev/nocodb/nocodb:latest
    container_name: ivd_nocodb
    restart: always
    environment:
      NC_DB: "pg://db:5432?u=myuser&p=mypassword&d=ivd_data&schema=noco_meta"
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - ivd_net

  metabase:
    image: hub.rat.dev/metabase/metabase:v0.49.7
    container_name: ivd_metabase
    restart: always
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_internal2
      MB_DB_PORT: 5432
      MB_DB_USER: myuser
      MB_DB_PASS: mypassword
      MB_DB_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - ivd_net

  # 4 个业务 Shiny 容器（项目管理大盘）
  app-shiny-1:
    image: ivd_shiny:20260305
    restart: always
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DBNAME: ivd_data
      PG_USER: myuser
      PG_PASSWORD: mypassword
    depends_on:
      - db
    networks:
      - ivd_net

  app-shiny-2:
    image: ivd_shiny:20260305
    restart: always
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DBNAME: ivd_data
      PG_USER: myuser
      PG_PASSWORD: mypassword
    depends_on:
      - db
    networks:
      - ivd_net

  app-shiny-3:
    image: ivd_shiny:20260305
    restart: always
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DBNAME: ivd_data
      PG_USER: myuser
      PG_PASSWORD: mypassword
    depends_on:
      - db
    networks:
      - ivd_net

  app-shiny-4:
    image: ivd_shiny:20260305
    restart: always
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DBNAME: ivd_data
      PG_USER: myuser
      PG_PASSWORD: mypassword
    depends_on:
      - db
    networks:
      - ivd_net

  # 2 个登录 / 鉴权 Shiny 容器
  auth-shiny-1:
    image: ivd_auth_shiny:20260305
    restart: always
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DBNAME: ivd_data
      PG_USER: myuser
      PG_PASSWORD: mypassword
    depends_on:
      - db
    networks:
      - ivd_net

  auth-shiny-2:
    image: ivd_auth_shiny:20260305
    restart: always
    environment:
      PG_HOST: db
      PG_PORT: "5432"
      PG_DBNAME: ivd_data
      PG_USER: myuser
      PG_PASSWORD: mypassword
    depends_on:
      - db
    networks:
      - ivd_net

  # Nginx 网关
  nginx:
    image: hub.rat.dev/library/nginx:alpine
    container_name: ivd_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-shiny-1
      - app-shiny-2
      - app-shiny-3
      - app-shiny-4
      - auth-shiny-1
      - auth-shiny-2
    networks:
      - ivd_net

networks:
  ivd_net:
    name: ivd_network
