###############################################################################
# Nginx 入口配置（带详细注释版）
# - 负责把浏览器请求转发到三个 Shiny 集群：
#   - app_shiny：临床项目进度管理看板（甘特图）
#   - maintain_shiny：数据库信息维护
#   - auth_shiny：登录 / 鉴权（login.R）
# - 负责做「是否已登录」的判断，并在未登录时 302 到 /login/
# - 根路径 / 返回静态导航页
###############################################################################

###############################################################################
# 一、定义后端集群
###############################################################################

upstream app_shiny {
    ip_hash;
    server app-shiny-1:3838;
    server app-shiny-2:3838;
    server app-shiny-3:3838;
    server app-shiny-4:3838;
}

upstream maintain_shiny {
    ip_hash;
    server maintain-shiny-1:3838;
    server maintain-shiny-2:3838;
}

upstream auth_shiny {
    least_conn;
    server auth-shiny-1:3838;
    server auth-shiny-2:3838;
}

###############################################################################
# 二、对外唯一入口：监听 80 端口
###############################################################################

server {
    listen 80;

    ###########################################################################
    # 2.1 静态导航页：根路径 /
    #
    # 返回 nav.html 导航页，引导用户选择甘特图或数据库维护
    ###########################################################################

    location = / {
        root /usr/share/nginx/html;
        index nav.html;
    }

    # nav.html 本身
    location = /nav.html {
        root /usr/share/nginx/html;
    }

    ###########################################################################
    # 2.2 鉴权子请求：/auth-verify
    ###########################################################################

    location = /auth-verify {
        internal;
        proxy_set_header X-Auth-Verify "1";
        proxy_pass http://auth_shiny/;
    }

    ###########################################################################
    # 2.3 处理鉴权失败（401）：跳转到 /login/
    ###########################################################################

    error_page 401 = @error401;

    location @error401 {
        return 302 /login/;
    }

    ###########################################################################
    # 2.4 处理 /login（无尾斜杠）：统一跳到 /login/
    ###########################################################################

    location = /login {
        return 302 /login/;
    }

    ###########################################################################
    # 2.5 处理 /login/ 本身：始终打到 auth_shiny
    ###########################################################################

    location = /login/ {
        proxy_pass http://auth_shiny/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /login/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    ###########################################################################
    # 2.6 处理 /login/xxx：登录页的静态资源等
    ###########################################################################

    location ~ ^/login/(.*)$ {
        proxy_pass http://auth_shiny/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /login/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    ###########################################################################
    # 2.7 甘特图业务：/gantt/ 路径
    #
    # 需要鉴权，鉴权通过后将 X-User 传递给 app_shiny
    ###########################################################################

    location = /gantt {
        return 302 /gantt/;
    }

    location /gantt/ {
        auth_request /auth-verify;
        auth_request_set $user $upstream_http_x_user;
        proxy_set_header X-User $user;

        # auth 子请求 5xx 时也跳转登录页（防止鉴权容器重启期间绕过）
        error_page 401 500 502 503 504 = @error401;

        rewrite ^/gantt/(.*)$ /$1 break;
        proxy_pass http://app_shiny;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    ###########################################################################
    # 2.8 数据库维护：/maintain/ 路径
    #
    # 需要鉴权，鉴权通过后将 X-User 传递给 maintain_shiny
    ###########################################################################

    location = /maintain {
        return 302 /maintain/;
    }

    location /maintain/ {
        auth_request /auth-verify;
        auth_request_set $user $upstream_http_x_user;
        proxy_set_header X-User $user;

        # auth 子请求 5xx 时也跳转登录页
        error_page 401 500 502 503 504 = @error401;

        rewrite ^/maintain/(.*)$ /$1 break;
        proxy_pass http://maintain_shiny;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
