###############################################################################
# Nginx 入口配置（带详细注释版）
# - 负责把浏览器请求转发到两个 Shiny 集群：
#   - app_shiny：临床项目进度管理看板（甘特图）
#   - auth_shiny：登录 / 鉴权（login.R）
# - 负责做「是否已登录」的判断，并在未登录时 302 到 /login/
# - 说明：# 开头的是注释，对 Nginx 没有任何影响，只是帮助你阅读
###############################################################################

###############################################################################
# 一、定义后端集群：app_shiny（业务大盘）
###############################################################################

upstream app_shiny {
    # ip_hash：
    # - 一种负载均衡算法
    # - 根据「客户端 IP」算一个哈希值
    # - 同一个 IP 的请求，总是落到同一台后端
    # - 对 Shiny 这种「有会话（session）」的应用很关键：
    #   如果一个用户的请求来回切换后端，Shiny 会话容易乱掉
    ip_hash;

    # 每一行 server 都是一个后端节点，语法：server 主机名:端口;
    # 这里的 app-shiny-1~4 来源于 docker-compose 里的服务名，
    # 在 Docker 内部可以直接当主机名用。
    server app-shiny-1:3838;
    server app-shiny-2:3838;
    server app-shiny-3:3838;
    server app-shiny-4:3838;
}

###############################################################################
# 二、定义后端集群：auth_shiny（登录 / 鉴权）
###############################################################################

upstream auth_shiny {
    # least_conn：
    # - 另一种负载均衡算法
    # - 每次把新请求分配给「当前连接数最少」的那台后端
    # - 登录请求比较短、没有长连接，用这个策略就够用了
    least_conn;

    # 两个登录 Shiny 容器，端口同样是 3838
    server auth-shiny-1:3838;
    server auth-shiny-2:3838;
}

###############################################################################
# 三、对外唯一入口：监听 80 端口
###############################################################################

server {
    # listen 80：
    # - 让当前这个 server 块监听本机的 80 端口
    # - Docker 外部会把宿主机端口映射到容器里的 80
    listen 80;

    ###########################################################################
    # 3.1 鉴权子请求：/auth-verify
    #
    # 作用：
    # - 仅供 Nginx 自己内部调用，用来问「当前这个请求有没有登录？」
    # - 浏览器不会直接访问 /auth-verify
    # 工作流程：
    # - 当用户访问 location /（见下方）时，
    #   Nginx 会先发一个 GET /auth-verify 的内部子请求给 auth_shiny
    # - login.R 根据 Cookie 查库，如果通过：
    #     返回 200，并带一个响应头 X-User: 工号
    #   如果未登录：
    #     返回 401
    ###########################################################################
    location = /auth-verify {
        # internal：
        # - 把这个 location 标记为「内部专用」
        # - 浏览器直接请求 /auth-verify 会被 Nginx 拒绝
        # - 只能通过 auth_request /auth-verify; 这种方式间接调用
        internal;

        # proxy_set_header：
        # - 给发往后端的请求加上一个 HTTP 头
        # - 这里是 X-Auth-Verify: 1
        # 用途：
        # - 告诉 login.R：「这是一次鉴权请求」
        # - login.R 收到后，只需要返回 200 或 401，不需要渲染 HTML 页面
        proxy_set_header X-Auth-Verify "1";

        # proxy_pass http://auth_shiny/：
        # - 把请求发给上面定义的 upstream auth_shiny
        # - 结尾有一个 /：
        #   表示把原始 URI 的 path 部分替换为 /（发到根路径）
        #   由 login.R 的 ui(req) 统一处理所有请求
        proxy_pass http://auth_shiny/;
    }

    ###########################################################################
    # 3.2 处理鉴权失败（401）：跳转到 /login/
    ###########################################################################

    # error_page 401 = @error401：
    # - 上游返回 401 时，不直接把 401 给浏览器
    # - 而是切换到名为 @error401 的「命名 location」继续处理
    error_page 401 = @error401;

    # 命名 location：@error401
    # - 只能由 Nginx 内部跳转过来，浏览器不能直接访问 @error401
    location @error401 {
        # return 302 /login/：
        # - 返回一个 302 重定向
        # - Location 头为 /login/
        # - 浏览器拿到后会主动跳到 http://host/login/
        return 302 /login/;
    }

    ###########################################################################
    # 3.3 处理 /login（无尾斜杠）：统一跳到 /login/
    ###########################################################################

    # location = /login：
    # - 「=」表示精确匹配，只匹配路径恰好是 /login 的请求
    location = /login {
        # 把 /login 统一重定向到 /login/：
        # - 避免最终 URL 停在 /login（无尾斜杠）
        # - 否则 HTML 里的相对路径会按「根 /」来解析，静态资源可能打到 app_shiny
        return 302 /login/;
    }

    ###########################################################################
    # 3.4 处理 /login/ 本身：始终打到 auth_shiny
    ###########################################################################

    # location = /login/：
    # - 精确匹配 GET /login/
    # - 优先级高于正则 location 和 location /
    # - 确保 /login/ 一定由登录应用处理，不会被甘特图那边抢走
    location = /login/ {
        # 直接把请求代理到 auth_shiny 的根路径 /
        proxy_pass http://auth_shiny/;

        # 使用 HTTP/1.1，支持 keep-alive 和 upgrade
        proxy_http_version 1.1;

        # 把客户端请求里的 Host 头原样传给后端
        # - $host 是 Nginx 内置变量，值是请求中的 Host 字段，如 localhost 或域名
        proxy_set_header Host $host;

        # 自定义头：X-Forwarded-Prefix
        # - 告诉后端「当前应用是挂在 /login/ 这个前缀下面的」
        # - 某些框架生成绝对路径时会用到这个信息
        proxy_set_header X-Forwarded-Prefix /login/;

        # 以下两行用于 WebSocket / HTTP 升级（Shiny 的长连接需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    ###########################################################################
    # 3.5 处理 /login/xxx：登录页的静态资源等
    ###########################################################################

    # location ~ ^/login/(.*)$：
    # - 「~」表示使用正则表达式匹配
    # - ^/login/(.*)$ 匹配所有以 /login/ 开头的路径
    #   例如：
    #     /login/visjs-7.4.9/vis-timeline-graph2d.min.css
    #     /login/jquery-3.7.1/jquery.min.js
    # - 括号里的 (.*) 会被捕获到变量 $1 中
    location ~ ^/login/(.*)$ {
        # proxy_pass http://auth_shiny/$1$is_args$args：
        # - 仍然转发到 auth_shiny 集群
        # - $1：上面正则里 (.*) 捕获到的那一截路径（即 /login/ 后面的部分）
        # - $args：原始查询字符串（例如 a=1&b=2）
        # - $is_args：如果有查询字符串则为 "?"，否则为空
        #   → $1$is_args$args 组合起来，就能还原出「路径 + 查询参数」
        #   举例：
        #     请求：/login/foo/bar.css?version=1
        #     $1 = "foo/bar.css"
        #     $is_args = "?"
        #     $args = "version=1"
        #     结果：auth_shiny/foo/bar.css?version=1
        proxy_pass http://auth_shiny/$1$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /login/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    ###########################################################################
    # 3.6 业务大盘（甘特图）：location /
    #
    # - 匹配所有「非 /login」的路径：
    #   /         → 看板首页
    #   /xxx     → 看板内部使用的资源或路由
    # - 请求流程：
    #   1）先走 auth_request /auth-verify 进行鉴权
    #   2）若鉴权返回 200，则把 X-User（工号）写到头里
    #   3）再把请求代理到 app_shiny
    ###########################################################################

    # location /：
    # - 匹配所有以 / 开头的路径（也就是绝大多数请求）
    # - 因为前面有更具体的 /login、/login/、正则 /login/xxx，
    #   所以 /login 相关的请求不会落到这里
    location / {
        # auth_request /auth-verify：
        # - 打一个内部子请求到 /auth-verify（上面定义的 location）
        # - 根据 /auth-verify 返回的状态码决定是否继续：
        #     200：认为已登录，继续执行本 location 的后续配置
        #     401：触发 error_page 401 = @error401，返回 302 /login/
        auth_request /auth-verify;

        # auth_request_set 变量名 上游响应头：
        # - 把鉴权子请求返回的响应头 X-User 的值，存到变量 $user 里
        # - $upstream_http_x_user：
        #     「upstream_http_ + 头名小写」的形式，是 Nginx 自动映射出的变量
        auth_request_set $user $upstream_http_x_user;

        # proxy_set_header X-User $user：
        # - 把刚才拿到的工号放进发往 app_shiny 的请求头 X-User
        # - app.R 里可以通过 session$request$HTTP_X_USER 读到这个值，
        #   用于做权限控制、在页面上显示「姓名-工号」等
        proxy_set_header X-User $user;

        # proxy_pass http://app_shiny：
        # - 把请求代理到 app_shiny 上游集群
        # - 注意这里没有结尾的 /：
        #   表示「保持原始的 URI 不变」，
        #   例如浏览器请求 /abc，后端看到的也是 /abc
        proxy_pass http://app_shiny;

        # 以下是常规的反向代理设置：使用 HTTP/1.1，支持 Upgrade，并传递 Host 头
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
